name: terraform

# PRs run fmt/validate/plan automatically.
# Applies are MANUAL only: trigger "Run workflow" and pick an environment.
# The apply job is gated by a GitHub Environment, so it waits for approval
# if you configure required reviewers on that environment.

on:
  pull_request:
    branches: [main]
    paths: ["terraform/**", ".github/workflows/deploy.yml"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        type: choice
        options: [dev, stage, prod]
        default: dev
      action:
        description: "plan or apply"
        type: choice
        options: [plan, apply]
        default: plan

permissions:
  contents: read
  id-token: write # required for OIDC assume-role
  pull-requests: write # to comment the plan on PRs

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  plan:
    # Auto on PRs, and on manual dispatch when action=plan.
    if: github.event_name == 'pull_request' || github.event.inputs.action == 'plan'
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Set environment
        id: env
        run: echo "name=${{ github.event.inputs.environment || 'dev' }}" >> "$GITHUB_OUTPUT"
      - name: Terraform plan
        run: |
          terraform init -backend-config=${{ steps.env.outputs.name }}/backend.hcl
          terraform plan -input=false \
            -var-file=${{ steps.env.outputs.name }}/terraform.tfvars \
            -no-color | tee plan.txt
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8').slice(0, 60000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '### Terraform plan (dev)\n```\n' + plan + '\n```'
            });

  apply:
    # Manual only, action=apply. Gated by the GitHub Environment for approvals.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply
        run: |
          terraform init -backend-config=${{ github.event.inputs.environment }}/backend.hcl
          terraform apply -input=false -auto-approve \
            -var-file=${{ github.event.inputs.environment }}/terraform.tfvars
