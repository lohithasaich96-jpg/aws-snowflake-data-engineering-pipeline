# Prometheus scrape config for platform components.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: airflow
    metrics_path: /admin/metrics
    static_configs:
      - targets: ["airflow-webserver:8080"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: statsd-exporter
    static_configs:
      - targets: ["statsd-exporter:9102"]
